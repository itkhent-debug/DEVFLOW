<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Deployify</title>
  <meta name="description" content="Deployify Dashboard - Manage your projects and deployments" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* DASHBOARD-SPECIFIC STYLES */
    body { background: #060608; }
    .dash-layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #09090f;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px 24px;
      text-decoration: none; color: white;
      font-size: 17px; font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 12px;
    }
    .sidebar-logo svg polygon { transition: fill 0.2s; }
    .sidebar-nav { flex: 1; padding: 0 10px; }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      border-radius: 9px;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
      font-size: 13.5px; font-weight: 500;
      margin-bottom: 2px;
      transition: all 0.2s;
    }
    .sidebar-link:hover { color: white; background: rgba(255,255,255,0.06); }
    .sidebar-link.active { color: white; background: rgba(139,92,246,0.15); }
    .sidebar-link svg { flex-shrink: 0; }
    .sidebar-bottom { padding: 16px 10px; border-top: 1px solid rgba(255,255,255,0.06); }
    .user-widget {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .user-widget:hover { background: rgba(255,255,255,0.06); }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-plan { font-size: 11px; color: rgba(255,255,255,0.4); }

    /* Main content */
    .main-content { margin-left: 240px; flex: 1; min-height: 100vh; }
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 36px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(6,6,8,0.8);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
    }
    .dash-header h1 { font-size: 18px; font-weight: 700; }
    .dash-content { padding: 36px; }

    /* Stat cards */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
    .stat-card {
      background: #111119;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
    }
    .stat-card:hover { border-color: rgba(255,255,255,0.14); }
    .stat-card-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
    .stat-card-val { font-size: 28px; font-weight: 800; color: white; margin-bottom: 4px; }
    .stat-card-sub { font-size: 12px; color: rgba(255,255,255,0.4); }

    /* Projects section */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-header h2 { font-size: 16px; font-weight: 700; }

    /* Project cards */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .project-card {
      background: #111119;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 22px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
    }
    .project-card:hover { border-color: rgba(139,92,246,0.4); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .project-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .project-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(59,130,246,0.2));
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .project-status {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 100px;
    }
    .project-status.ready { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .project-status.building { background: rgba(249,115,22,0.12); color: #f97316; border: 1px solid rgba(249,115,22,0.3); animation: pulse 1.5s infinite; }
    .project-status.error { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .project-status.queued { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.12); }
    .project-name { font-size: 15px; font-weight: 700; color: white; margin-bottom: 4px; }
    .project-repo { font-size: 12px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; }
    .project-url { font-size: 12px; color: #8b5cf6; word-break: break-all; }
    .project-meta { display: flex; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .project-meta-item { font-size: 11px; color: rgba(255,255,255,0.35); display: flex; align-items: center; gap: 4px; }

    /* Empty state */
    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 56px; margin-bottom: 20px; }
    .empty-state h3 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 28px; }

    /* Loading spinner */
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.6 } }

    /* Loading state */
    .loading-state { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 60px; color: rgba(255,255,255,0.4); font-size: 14px; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .stat-row { grid-template-columns: 1fr; }
      .dash-content { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="dash-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="/" class="sidebar-logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><polygon points="14,2 26,24 2,24" fill="white"/></svg>
      Deployify
    </a>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="sidebar-link active" id="sl-dashboard">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        Dashboard
      </a>
      <a href="/import" class="sidebar-link" id="sl-import">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Import from GitHub
      </a>
      <a href="/upload" class="sidebar-link" id="sl-upload">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Upload Files
      </a>
      <a href="#" class="sidebar-link" id="sl-settings">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Settings
      </a>
      <a href="#" class="sidebar-link" id="sl-docs">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="1.5"/><polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="1.5"/></svg>
        Documentation
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-widget" id="user-widget">
        <div class="user-avatar" id="user-avatar-el">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name-el">Loading...</div>
          <div class="user-plan">Hobby Plan</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="dash-header">
      <h1>Dashboard</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <a href="/upload" class="btn btn-outline" id="btn-upload" style="font-size:13px;padding:8px 14px;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Upload Files
        </a>
        <a href="/import" class="btn btn-primary" id="btn-new-project" style="font-size:13px;padding:8px 16px;">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          New Project
        </a>
        <button onclick="handleLogout()" class="btn btn-ghost" id="btn-logout" style="font-size:13px;padding:8px 14px;">Log out</button>
      </div>
    </header>

    <div class="dash-content">
      <!-- Stats -->
      <div class="stat-row" id="stat-row">
        <div class="stat-card">
          <div class="stat-card-label">Total Projects</div>
          <div class="stat-card-val" id="stat-projects">0</div>
          <div class="stat-card-sub">All time</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Deployments</div>
          <div class="stat-card-val" id="stat-deployments">0</div>
          <div class="stat-card-sub">All time</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Live Projects</div>
          <div class="stat-card-val" id="stat-live">0</div>
          <div class="stat-card-sub">Status: Ready</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Avg Deploy Time</div>
          <div class="stat-card-val" id="stat-avgtime">—</div>
          <div class="stat-card-sub">seconds</div>
        </div>
      </div>

      <!-- Projects -->
      <div class="section-header">
        <h2>Your Projects</h2>
        <button onclick="loadProjects()" class="btn btn-ghost" id="btn-refresh" style="font-size:12px;padding:6px 12px;">↻ Refresh</button>
      </div>
      <div id="projects-area">
        <div class="loading-state"><div class="spinner"></div> Loading projects...</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = null;

async function init() {
  const res = await fetch('/api/auth/me');
  const data = await res.json();
  if (!data.authenticated) return window.location.href = '/';
  currentUser = data.user;

  // Set user info
  document.getElementById('user-name-el').textContent = data.user.name || data.user.login;
  const avatarEl = document.getElementById('user-avatar-el');
  if (data.user.avatar) {
    avatarEl.innerHTML = `<img src="${data.user.avatar}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" alt="avatar" />`;
  } else {
    avatarEl.textContent = (data.user.login || 'U')[0].toUpperCase();
  }

  loadProjects();
}

async function loadProjects() {
  const area = document.getElementById('projects-area');
  area.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading projects...</div>';

  const res = await fetch('/api/projects');
  const projects = await res.json();

  // Update stats
  const liveCount = projects.filter(p => p.status === 'ready').length;
  const totalDeploys = projects.reduce((s, p) => s + p.deployments.length, 0);
  document.getElementById('stat-projects').textContent = projects.length;
  document.getElementById('stat-deployments').textContent = totalDeploys;
  document.getElementById('stat-live').textContent = liveCount;

  if (projects.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🚀</div>
        <h3>No projects yet</h3>
        <p>Import a GitHub repository to get started.<br/>Your first deployment takes under 10 seconds.</p>
        <a href="/import" class="btn btn-primary btn-xl" id="btn-empty-import">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Import from GitHub
        </a>
      </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'projects-grid';
  projects.forEach(p => {
    const deployId = p.lastDeployId || '';
    const statusIcons = { ready: '●', building: '◌', error: '✗', queued: '○' };
    const card = document.createElement('a');
    card.className = 'project-card';
    card.href = deployId ? `/deploy/${deployId}` : '#';
    card.id = `project-${p.id}`;
    card.innerHTML = `
      <div class="project-card-top">
        <div class="project-icon">🌐</div>
        <span class="project-status ${p.status}">${statusIcons[p.status] || '○'} ${p.status}</span>
      </div>
      <div class="project-name">${escHtml(p.name)}</div>
      <div class="project-repo">⎇ ${escHtml(p.repo)} / ${escHtml(p.branch)}</div>
      ${p.url ? `<div class="project-url">🔗 ${escHtml(p.url)}</div>` : '<div class="project-url" style="color:rgba(255,255,255,0.3)">Deploying...</div>'}
      <div class="project-meta">
        <span class="project-meta-item">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          ${p.deployments.length} deploy${p.deployments.length !== 1 ? 's' : ''}
        </span>
        <span class="project-meta-item">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><polyline points="12,6 12,12 16,14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          ${timeAgo(p.createdAt)}
        </span>
        <span class="project-meta-item">${escHtml(p.framework || 'Static')}</span>
      </div>`;
    grid.appendChild(card);
  });
  area.innerHTML = '';
  area.appendChild(grid);

  // Poll for building projects
  const building = projects.filter(p => p.status === 'building' || p.status === 'queued');
  if (building.length > 0) {
    setTimeout(loadProjects, 3000);
  }
}

async function handleLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/';
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

init();
</script>
</body>
</html>
